name: Deploy to EC2 (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t bookmyshow-app .

      - name: Save Docker image as tar
        run: |
          docker save bookmyshow-app > bookmyshow-app.tar

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "bookmyshow-app.tar"
          target: "/home/${{ secrets.EC2_USER }}/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Stop old container if exists
            docker stop bookmyshow || true
            docker rm bookmyshow || true

            # Load new image
            docker load < bookmyshow-app.tar

            # Run container
            docker run -d \
              -p 3000:3000 \
              --name bookmyshow \
              bookmyshow-app

            # Cleanup
            rm bookmyshow-app.tar
